# SoloLab Docker Compose 配置
# 一键启动: docker compose up -d

services:
  # ==================== 基础设施 ====================
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sololab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sololab}
      POSTGRES_DB: ${POSTGRES_DB:-sololab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sololab}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-sololab}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sololab}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 应用服务 ====================
  opencode:
    build:
      context: .
      dockerfile: infra/docker/opencode.Dockerfile
    restart: unless-stopped
    ports:
      - "${OPENCODE_PORT:-3101}:3100"
    env_file: .env
    environment:
      OPENCODE_SERVER_PASSWORD: "${OPENCODE_SERVER_PASSWORD:-}"
      OPENCODE_SERVER_USERNAME: "${OPENCODE_SERVER_USERNAME:-opencode}"
    volumes:
      - ./opencode:/app/opencode-src:ro
      - opencode_data:/root/.local/share/opencode
      - ${HOME:-/Users}:/host-home
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3100/session').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # 容器内部通过服务名连接，覆盖 .env 中的 localhost
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-sololab}:${POSTGRES_PASSWORD:-sololab}@postgres:5432/${POSTGRES_DB:-sololab}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-sololab}@redis:6379/0"
      OPENCODE_URL: "http://opencode:3100"
      REAL_HOME: "${HOME:-/Users/unknown}"
    volumes:
      - ./backend:/app/backend
      - ./storage:/app/storage
      - ${HOME:-/Users}:/host-home:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opencode:
        condition: service_healthy
    command: ["--reload"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  opencode_data:
  caddy_data:
  caddy_config:
