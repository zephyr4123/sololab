model_list:
  # === 高质量推理（默认模型）===
  - model_name: "reasoning"
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/LLM_API_KEY
      api_base: os.environ/LLM_BASE_URL

  # === 长上下文写作 ===
  - model_name: "writer"
    litellm_params:
      model: openai/claude-sonnet-4-20250514
      api_key: os.environ/LLM_API_KEY
      api_base: os.environ/LLM_BASE_URL

  # === 低成本发散思维 ===
  - model_name: "divergent"
    litellm_params:
      model: openai/deepseek-chat
      api_key: os.environ/LLM_API_KEY
      api_base: os.environ/LLM_BASE_URL

  # === 多模态 ===
  - model_name: "multimodal"
    litellm_params:
      model: openai/gemini-2.0-flash
      api_key: os.environ/LLM_API_KEY
      api_base: os.environ/LLM_BASE_URL

litellm_settings:
  fallbacks:
    - {"reasoning": ["divergent"]}
    - {"writer": ["reasoning"]}

  max_budget: 50.0  # 美元/月
  budget_duration: "30d"

  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    ttl: 3600
