# Docker Compose 生产环境覆盖配置
# 使用: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# 前提: ~/docker-services/ 的 PostgreSQL 和 Redis 已运行

services:
  backend:
    command: uvicorn sololab.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - DEBUG=false
    volumes:
      - ./storage:/app/storage

  frontend:
    command: node server.js
    environment:
      - NODE_ENV=production

  caddy:
    restart: unless-stopped
